name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Cheap gates first — fail fast before the slow steps
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Data integrity
        run: node scripts/check-data.cjs
      - name: Dead code (knip)
        run: npm run knip
      - name: i18n binary-ternary baseline
        run: npm run check-i18n

      - run: npm run build
      - run: npm test
      - name: Coverage thresholds (utils + hooks must stay 100%)
        run: npm run test:coverage

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E Tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
